spring:
  application:
    name: weza


  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wezastore}
    username: ${DB_USER:wezastore}
    password: ${DB_PASSWORD:wezastore}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true




