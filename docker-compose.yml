services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weza-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/wezastore
      DB_USER: wezastore
      DB_PASSWORD: wezastore

  postgres:
    image: postgres:16-alpine
    container_name: weza-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wezastore
      POSTGRES_USER: wezastore
      POSTGRES_PASSWORD: wezastore
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wezastore-net


volumes:
  postgres-data:

networks:
  wezastore-net:
    driver: bridge